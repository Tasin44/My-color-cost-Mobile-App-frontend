image: cirrusci/flutter:stable

stages:
  - build

variables:
  LC_ALL: "C.UTF-8"

cache:
  key: "flutter-cache"
  paths:
    - .pub-cache/

before_script:
  - flutter --version
  - flutter pub get

build_apk:
  stage: build
  script:
    - flutter build apk --release
  artifacts:
    paths:
      - build/app/outputs/flutter-apk/app-release.apk
    expire_in: 7 days
