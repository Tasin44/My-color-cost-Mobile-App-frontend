name: color_os
description: "A new Flutter project."

publish_to: 'none' 


version: 1.0.0+9

environment:
  sdk: ^3.9.0


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.3
  get: ^4.7.3
  fl_chart: ^1.1.1
  intl: ^0.20.2
  mobile_scanner: ^7.2.0
  hugeicons: ^0.0.7
  http: ^1.6.0
  shared_preferences: ^2.5.4
  change_app_package_name: ^1.5.0
  image_picker: ^1.2.1
  mime: ^2.0.0
  http_parser: ^4.1.2
  url_launcher: ^6.3.2
  cached_network_image: ^3.4.1
  purchases_flutter: ^8.2.3
  onesignal_flutter: ^5.2.2
  country_picker: ^2.0.27

flutter_launcher_name:
  name: "My Colour Cost"

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21


flutter:


  uses-material-design: true

  assets:
    - assets/svg/ 
    - assets/images/ 
  